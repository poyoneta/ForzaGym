<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forza Gym - Panel de Administración</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        
        body {
            background-color: #0b0b0b;
            padding: 1.5rem;
            font-family: 'Montserrat', sans-serif;
            color: #fff;
            margin: 0;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        .header {
            border-bottom: 2px solid #39e4a5;
            padding-bottom: 1rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-weight: 900; margin: 0; font-size: 1.6rem; text-transform: uppercase; }
        .header h1 span { color: #39e4a5; }

        /* Estilos de la Tabla */
        .card-tabla {
            background-color: #1a1a1a;
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th, td {
            padding: 1rem;
            border-bottom: 1px solid #2d2d2d;
            font-size: 0.9rem;
        }
        th {
            color: #39e4a5;
            text-transform: uppercase;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        tr:hover { background-color: rgba(255,255,255,0.02); }

        .plan-badge {
            background-color: #111;
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.75rem;
            text-transform: uppercase;
            border: 1px solid #333;
        }
        .plan-premium { border-color: #39e4a5; color: #39e4a5; }

        /* Botones */
        .btn {
            padding: 0.5rem 0.8rem;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            text-transform: uppercase;
            font-size: 0.75rem;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        .btn-ficha { background-color: #39e4a5; color: #000; }
        .btn-ficha:hover { background-color: #2ec78f; transform: scale(1.02); }
        .btn-baja { background-color: transparent; border: 1px solid #ff4d4d; color: #ff4d4d; margin-left: 0.5rem; }
        .btn-baja:hover { background-color: #ff4d4d; color: #fff; }
        .btn-logout { background: transparent; border: 1px solid #ff4d4d; color: #ff4d4d; padding: 0.5rem 1rem; font-size: 0.85rem;}
        .btn-logout:hover { background: #ff4d4d; color: #fff; }

        /* === VENTANA FLOTANTE (MODAL DE FICHA MÉDICA) === */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 100; 
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
            justify-content: center; align-items: center;
            padding: 1rem;
            box-sizing: border-box;
        }
        .modal-content {
            background-color: #1a1a1a;
            border-top: 4px solid #39e4a5;
            padding: 2rem;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            position: relative;
        }
        .close-modal {
            position: absolute;
            top: 1rem; right: 1.2rem;
            color: #666; font-size: 1.5rem; cursor: pointer;
            transition: 0.2s;
        }
        .close-modal:hover { color: #ff4d4d; }
        .modal h2 { margin-top: 0; color: #39e4a5; font-size: 1.3rem; text-transform: uppercase; border-bottom: 1px solid #2d2d2d; padding-bottom: 0.5rem; }
        
        .info-ficha-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.2rem;
        }
        .info-block {
            background: #111;
            padding: 0.8rem;
            border-radius: 6px;
            border: 1px solid #2d2d2d;
        }
        .info-block span { display: block; font-size: 0.75rem; color: #666; font-weight: bold; text-transform: uppercase; margin-bottom: 0.2rem;}
        .info-block p { margin: 0; font-size: 0.95rem; font-weight: bold; }
        .info-block-full { grid-column: span 2; }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <h1>Panel <span>Backoffice</span></h1>
            <button class="btn btn-logout" onclick="cerrarSesion()"><i class="fa-solid fa-right-from-bracket"></i> Salir</button>
        </header>

        <div class="card-tabla">
            <h3 style="margin-top: 0; text-transform: uppercase; font-size: 1rem; letter-spacing: 0.5px; color: #aaa; margin-bottom: 1.5rem;"><i class="fa-solid fa-users"></i> Socios Inscriptos</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Teléfono</th>
                        <th>Plan</th>
                        <th>Vencimiento</th>
                        <th style="text-align: right;">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaSocios">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="modalFicha" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="cerrarModal()">&times;</span>
            <h2><i class="fa-solid fa-heart-pulse"></i> Ficha Física y Médica</h2>
            
            <div class="info-ficha-grid" id="detalleFicha">
                </div>
        </div>
    </div>

    <script>
        // Verificación de seguridad básica
        const adminId = localStorage.getItem('usuarioId');
        const adminRol = localStorage.getItem('usuarioRol');

        if (!adminId || adminRol !== 'admin') {
            window.location.href = 'login.html';
        }

        let listaSociosGlobal = []; // Guardamos temporalmente los datos traídos de la API

        async function cargarSocios() {
            try {
                const res = await fetch('/api/socios');
                listaSociosGlobal = await res.json();
                
                const tbody = document.getElementById('tablaSocios');
                tbody.innerHTML = '';

                listaSociosGlobal.forEach(socio => {
                    // Quitamos al propio administrador de la lista de clientes para no entorpecer
                    if(socio.email === 'admin@gym.com') return;

                    const claseBadge = socio.planElegido === 'Premium' ? 'plan-badge plan-premium' : 'plan-badge';
                    
                    // Formatear la fecha de vencimiento si existe
                    let vencimientoStr = "--/--/--";
                    if(socio.fechaFinPlan) {
                        vencimientoStr = new Date(socio.fechaFinPlan).toLocaleDateString('es-AR', {day: '2-digit', month: '2-digit', year: 'numeric'});
                    }

                    tbody.innerHTML += `
                        <tr>
                            <td>#${socio.id}</td>
                            <td style="font-weight: bold;">${socio.nombre}</td>
                            <td>${socio.email}</td>
                            <td>${socio.telefono}</td>
                            <td><span class="${claseBadge}">${socio.planElegido}</span></td>
                            <td style="font-weight: bold; color: #ccc;">${vencimientoStr}</td>
                            <td style="text-align: right;">
                                <button class="btn btn-ficha" onclick="verFichaSocio(${socio.id})"><i class="fa-solid fa-file-medical"></i> Ficha</button>
                                <button class="btn btn-baja" onclick="darDeBaja(${socio.id})"><i class="fa-solid fa-trash"></i> Baja</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error("Error al traer los socios:", err);
            }
        }

        // Función para abrir el modal con la radiografía médica del cliente elegido
        function verFichaSocio(id) {
            const socio = listaSociosGlobal.find(s => s.id === id);
            if (!socio) return;

            const detalle = document.getElementById('detalleFicha');
            
            // Evaluamos si el cliente rellenó sus datos, si no, avisamos que está vacía
            const peso = socio.peso ? `${socio.peso} Kg` : "No registrado";
            const altura = socio.altura ? `${socio.altura} Mts` : "No registrado";
            const sexo = socio.sexo || "No registrado";
            const lesiones = socio.lesiones || "Ninguna registrada / Sin dolores";
            const actividadExtra = socio.actividadExtra || "Ninguna / Solo gimnasio";
            
            let vencimientoStr = "No asignado / A convenir";
            if(socio.fechaFinPlan) {
                vencimientoStr = new Date(socio.fechaFinPlan).toLocaleDateString('es-AR', {day: '2-digit', month: '2-digit', year: 'numeric'});
            }

            detalle.innerHTML = `
                <div class="info-block-full" style="text-align: center; margin-bottom: 0.5rem;">
                    <p style="font-size: 1.1rem; color: #39e4a5;">${socio.nombre}</p>
                    <span style="font-size: 0.8rem; color: #666;">Socio #${socio.id}</span>
                </div>
                <div class="info-block">
                    <span>Peso</span>
                    <p>${peso}</p>
                </div>
                <div class="info-block">
                    <span>Altura</span>
                    <p>${altura}</p>
                </div>
                <div class="info-block">
                    <span>Sexo / Género</span>
                    <p>${sexo}</p>
                </div>
                <div class="info-block">
                    <span>Vencimiento del Plan</span>
                    <p style="color: #39e4a5;">${vencimientoStr}</p>
                </div>
                <div class="info-block info-block-full">
                    <span>Lesiones, Dolores o Golpes</span>
                    <p style="color: #ff4d4d; font-weight: normal; font-size: 0.9rem; line-height: 1.4;">${lesiones}</p>
                </div>
                <div class="info-block info-block-full">
                    <span>Otras Actividades (Fútbol, Boxeo, etc.)</span>
                    <p style="color: #ccc; font-weight: normal; font-size: 0.9rem;">${actividadExtra}</p>
                </div>
            `;

            document.getElementById('modalFicha').style.display = 'flex';
        }

        function cerrarModal() {
            document.getElementById('modalFicha').style.display = 'none';
        }

        async function darDeBaja(id) {
            if (confirm("¿Estás seguro de dar de baja a este socio del gimnasio?")) {
                const res = await fetch(`/api/socios/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    cargarSocios();
                } else {
                    alert("No se pudo procesar la baja.");
                }
            }
        }

        function cerrarSesion() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        // Cerrar modal si hace clic fuera de la caja
        window.onclick = function(event) {
            const modal = document.getElementById('modalFicha');
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }

        cargarSocios();
    </script>
</body>
</html>
