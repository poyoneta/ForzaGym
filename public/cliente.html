<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forza Gym - Mi Perfil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        
        body {
            background-color: #0b0b0b;
            padding: 1.5rem;
            font-family: 'Montserrat', sans-serif;
            color: #fff;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            border-bottom: 2px solid #39e4a5;
            padding-bottom: 1rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-weight: 900; margin: 0; font-size: 1.6rem; text-transform: uppercase; }
        .header h1 span { color: #39e4a5; }
        
        .card {
            background-color: #1a1a1a;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }
        .card h2 { 
            color: #39e4a5; 
            margin-top: 0; 
            font-size: 1.2rem; 
            text-transform: uppercase; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            padding-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        label {
            font-size: 0.85rem;
            color: #aaa;
            font-weight: 700;
            text-transform: uppercase;
        }
        select, input, textarea {
            background-color: #111;
            border: 1px solid #333;
            color: #fff;
            padding: 0.8rem;
            border-radius: 6px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
            box-sizing: border-box;
            width: 100%;
        }
        select:focus, input:focus, textarea:focus { border-color: #39e4a5; outline: none; }
        textarea { resize: vertical; min-height: 70px; }
        
        .btn {
            background-color: #39e4a5;
            color: #000;
            border: none;
            padding: 0.8rem;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }
        .btn:hover { transform: scale(1.01); background-color: #2ec78f; }
        .btn-logout { background: transparent; border: 1px solid #ff4d4d; color: #ff4d4d; padding: 0.5rem 1rem; font-size: 0.85rem;}
        .btn-logout:hover { background: #ff4d4d
