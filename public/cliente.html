<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forza Gym - Mi Perfil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="manifest" href="/manifest.json">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        
        body {
            background-color: #0b0b0b;
            padding: 1.5rem;
            font-family: 'Montserrat', sans-serif;
            color: #fff;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            border-bottom: 2px solid #39e4a5;
            padding-bottom: 1rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-weight: 900; margin: 0; font-size: 1.6rem; text-transform: uppercase; }
        .header h1 span { color: #39e4a5; }
        
        .card {
            background-color: #1a1a1a;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }
        .card h2 { 
            color: #39e4a5; 
            margin-top: 0; 
            font-size: 1.2rem; 
            text-transform: uppercase; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            padding-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; }
        label { font-size: 0.85rem; color: #aaa; font-weight: 700; text-transform: uppercase; }
        select, input, textarea { background-color: #111; border: 1px solid #333; color: #fff; padding: 0.8rem; border-radius: 6px; font-family: 'Montserrat'; font-size: 0.95rem; box-sizing: border-box; width: 100%; }
        select:focus, input:focus, textarea:focus { border-color: #39e4a5; outline: none; }
        
        .btn { background-color: #39e4a5; color: #000; border: none; padding: 0.8rem; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn:hover { transform: scale(1.01); background-color: #2ec78f; }
        .btn-logout { background: transparent; border: 1px solid #ff4d4d; color: #ff4d4d; padding: 0.5rem 1rem; font-size: 0.85rem;}
        .btn-logout:hover { background: #ff4d4d; color: #fff; }

        .historial-lista { list-style: none; padding: 0; margin: 0; max-height: 200px; overflow-y: auto;}
        .historial-item { background: rgba(255,255,255,0.02); padding: 0.8rem; border-left: 3px solid #39e4a5; margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; border-radius: 4px; }
        .peso-tag { color: #39e4a5; font-weight: bold; }
        .fecha-tag { color: #666; font-size: 0.8rem; }

        /* Estilos Tabla Rutina de Clientes */
        .tabla-rutina-cliente { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        .tabla-rutina-cliente th, .tabla-rutina-cliente td { padding: 0.75rem; border-bottom: 1px solid #2d2d2d; text-align: left; font-size: 0.9rem; }
        .tabla-rutina-cliente th { color: #39e4a5; font-size: 0.8rem; text-transform: uppercase; }

        .bloqueado { filter: blur(4px); pointer-events: none; opacity: 0.3; }
        .capa-bloqueo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; text-align: center; padding: 1rem; box-sizing: border-box; }
        .capa-bloqueo i { color: #39e4a5; font-size: 2.5rem; margin-bottom: 1rem; }
        .capa-bloqueo p { font-weight: bold; text-transform: uppercase; font-size: 0.9rem; margin: 0; }

        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <h1>Hola, <span id="nombreCliente">Cliente</span></h1>
            <button class="btn btn-logout" onclick="cerrarSesion()"><i class="fa-solid fa-right-from-bracket"></i> Salir</button>
        </header>

        <section class="card">
            <h2><i class="fa-solid fa-id-card"></i> Mi Estado</h2>
            <div class="grid-2">
                <div class="form-group">
                    <label>Plan Actual</label>
                    <p style="margin: 0; font-size: 1.1rem;"><span id="planCliente" style="color:#39e4a5; font-weight:bold; text-transform:uppercase;">Regular</span></p>
                </div>
                <div class="form-group" style="text-align: right;">
                    <label>Fecha de Vencimiento</label>
                    <p style="margin: 0; font-size: 1.1rem;"><span id="venceCliente" style="color:#ff4d4d; font-weight:bold;">--/--/--</span></p>
                </div>
            </div>
        </section>

        <section class="card">
            <h2><i class="fa-solid fa-dumbbell"></i> Mi Plan de Entrenamiento</h2>
            <div id="metaRutinaCliente" style="margin-bottom: 1rem; font-size: 0.9rem; display: none;">
                <span>Enfoque: <strong id="clienteEnfoque" style="color:#39e4a5;"></strong></span> | 
                <span>Duración: <strong id="clienteDuracion" style="color:#fff;"></strong> semanas</span>
            </div>
            
            <div id="contenedorRutinaCliente">
                <p style="color: #666; font-size: 0.9rem; margin: 0;">Cargando tu rutina...</p>
            </div>
        </section>

        <section class="card">
            <h2><i class="fa-solid fa-heart-pulse"></i> Mi Ficha Física y Médica</h2>
            <form id="formFicha">
                <div class="grid-2">
                    <div class="form-group">
                        <label>Peso Actual (Kg)</label>
                        <input type="number" id="fichaPeso" step="0.1">
                    </div>
                    <div class="form-group">
                        <label>Altura (Metros)</label>
                        <input type="number" id="fichaAltura" step="0.01">
                    </div>
                </div>
                <div class="form-group">
                    <label>Sexo</label>
                    <select id="fichaSexo">
                        <option value="">Seleccionar...</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Femenino">Femenino</option>
                        <option value="Otro">Otro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>¿Tenés algún golpe, dolor o lesión actual?</label>
                    <textarea id="fichaLesiones"></textarea>
                </div>
                <div class="form-group">
                    <label>¿Realizás otra actividad física?</label>
                    <input type="text" id="fichaActividadExtra">
                </div>
                <button type="submit" class="btn" style="width: 100%;">Actualizar Ficha</button>
            </form>
        </section>

        <section class="card">
            <h2><i class="fa-solid fa-weight-hanging"></i> Registrar Récord de Carga</h2>
            <form id="formPesos" style="display: flex; flex-direction: column; gap: 1rem;">
                <div class="grid-2">
                    <div class="form-group">
                        <label>Ejercicio</label>
                        <select id="ejercicio" required>
                            <option value="Sentadillas">Sentadillas 🦵</option>
                            <option value="Press de Banca">Press de Banca 🦈</option>
                            <option value="Peso Muerto">Peso Muerto 🏋️‍♂️</option>
                            <option value="Press Militar">Press Militar 🏛️</option>
                            <option value="Bíceps con Barra">Bíceps con Barra 💪</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Peso Máximo (Kg)</label>
                        <input type="number" id="peso" step="0.5" required>
                    </div>
                </div>
                <button type="submit" class="btn">Guardar Carga</button>
            </form>
        </section>

        <section class="card">
            <h2><i class="fa-solid fa-chart-line"></i> Mi Historial de Progresos</h2>
            <ul id="listaHistorial" class="historial-lista"></ul>
        </section>

        <section class="card" id="seccionNutricion">
            <div id="contenidoNutricion">
                <h2><i class="fa-solid fa-apple-whole"></i> Asesoramiento Nutricional Premium</h2>
                <div class="form-group">
                    <label>Mi Objetivo Principal</label>
                    <select id="objetivoNutricion">
                        <option value="bajar">Definición / Bajar de peso 🏃‍♂️</option>
                        <option value="subir">Volumen / Ganar Masa Muscular 💪</option>
                        <option value="mantener">Mantenimiento / Rendimiento ⚡</option>
                    </select>
                </div>
            </div>
        </section>
    </div>

    <script>
        const socioId = localStorage.getItem('usuarioId');
        const socioNombre = localStorage.getItem('usuarioNombre');
        const socioRol = localStorage.getItem('usuarioRol');

        if (!socioId || socioRol !== 'cliente') { window.location.href = 'login.html'; }
        if (socioNombre) { document.getElementById('nombreCliente').textContent = socioNombre; }

        async function cargarDatosPerfil() {
            try {
                const resSocios = await fetch('/api/socios');
                const socios = await resSocios.json();
                const miData = socios.find(s => String(s.id) === String(socioId));
                
                if(miData) {
                    document.getElementById('planCliente').textContent = miData.planElegido || 'Regular';
                    
                    // =========================================================
                    // CÓDIGO CORREGIDO PARA CALCULAR LOS DÍAS RESTANTES
                    // =========================================================
                    const vencimientoElemento = document.getElementById('venceCliente');
                    const fechaFinStr = miData.fechaFinPlan || miData.FechaFinPlan;

                    if (fechaFinStr) {
                        const fechaVencimiento = new Date(fechaFinStr);
                        const fechaActual = new Date();

                        // Restamos las fechas y convertimos la diferencia de milisegundos a días
                        const diferenciaMili = fechaVencimiento - fechaActual;
                        const diasRestantes = Math.ceil(diferenciaMili / (1000 * 60 * 60 * 24));

                        if (diasRestantes > 0) {
                            vencimientoElemento.textContent = `${diasRestantes} días restantes`;
                            vencimientoElemento.style.color = "#39e4a5"; // Verde activo
                        } else if (diasRestantes === 0) {
                            vencimientoElemento.textContent = "Vence hoy";
                            vencimientoElemento.style.color = "#ffb020"; // Naranja de advertencia
                        } else {
                            vencimientoElemento.textContent = "Plan vencido";
                            vencimientoElemento.style.color = "#ff4d4d"; // Rojo expirado
                        }
                    } else {
                        vencimientoElemento.textContent = "A convenir";
                        vencimientoElemento.style.color = "#ff4d4d";
                    }
                    // =========================================================
                    
                    document.getElementById('fichaPeso').value = miData.peso || '';
                    document.getElementById('fichaAltura').value = miData.altura || '';
                    document.getElementById('fichaSexo').value = miData.sexo || '';
                    document.getElementById('fichaLesiones').value = miData.lesiones || '';
                    document.getElementById('fichaActividadExtra').value = miData.actividadExtra || '';

                    // Nutrición Premium
                    const seccionNutricion = document.getElementById('seccionNutricion');
                    const contenido = document.getElementById('contenidoNutricion');
                    if (miData.planElegido !== 'Premium' && seccionNutricion && contenido) {
                        contenido.classList.add('bloqueado');
                        seccionNutricion.innerHTML += `<div class="capa-bloqueo"><i class="fa-solid fa-lock"></i><p>Módulo de Nutrición Exclusivo para el <span style="color:#39e4a5;">Plan Premium</span></p></div>`;
                    }
                }
            } catch (err) { console.error("Error:", err); }

            // NUEVA LÓGICA: Traer Rutina Asignada por el Admin
            try {
                const resRutina = await fetch(`/api/rutinas/${socioId}`);
                const contenedor = document.getElementById('contenedorRutinaCliente');
                
                if (resRutina.ok) {
                    const rutina = await resRutina.json();
                    if(rutina && rutina.ejercicios && rutina.ejercicios.length > 0) {
                        document.getElementById('metaRutinaCliente').style.display = 'block';
                        document.getElementById('clienteEnfoque').textContent = rutina.enfoque || 'General';
                        document.getElementById('clienteDuracion').textContent = rutina.duracionSemanas || '4';
                        
                        let tablaHtml = `
                            <table class="tabla-rutina-cliente">
                                <thead>
                                    <tr>
                                        <th>Ejercicio</th>
                                        <th>Series</th>
                                        <th>Repeticiones</th>
                                        <th>Descanso</th>
                                    </tr>
                                </thead>
                                <tbody>
                        `;
                        
                        rutina.ejercicios.forEach(ej => {
                            tablaHtml += `
                                <tr>
                                    <td style="font-weight:bold; color:#fff;">${ej.nombre}</td>
                                    <td>${ej.series}</td>
                                    <td style="color:#39e4a5; font-weight:bold;">${ej.repeticiones}</td>
                                    <td style="color:#aaa;">${ej.descanso || '--'}</td>
                                </tr>
                            `;
                        });
                        
                        tablaHtml += `</tbody></table>`;
                        contenedor.innerHTML = tablaHtml;
                    } else {
                        contenedor.innerHTML = `<p style="color: #888; font-size: 0.9rem; margin: 0; background:#111; padding:1rem; border-radius:6px; border: 1px dashed #333;"><i class="fa-solid fa-circle-info"></i> No tenés un plan de ejercicios asignado actualmente. Consultá con el administrador.</p>`;
                    }
                } else {
                    contenedor.innerHTML = `<p style="color: #888; font-size: 0.9rem; margin: 0; background:#111; padding:1rem; border-radius:6px;"><i class="fa-solid fa-circle-info"></i> No tenés un plan asignado actualmente.</p>`;
                }
            } catch(e) {
                document.getElementById('contenedorRutinaCliente').innerHTML = `<p style="color: #ff4d4d; font-size: 0.9rem; margin:0;">Error al sincronizar tu rutina.</p>`;
            }

            // Historial de pesos
            try {
                const resPesos = await fetch(`/api/socios/pesos/${socioId}`);
                const pesos = await resPesos.json();
                const lista = document.getElementById('listaHistorial');
                if(!lista) return;
                if(!pesos || pesos.length === 0) {
                    lista.innerHTML = '<li style="color:#666; font-size:0.9rem; list-style:none;">Todavía no registraste cargas.</li>';
                    return;
                }
                lista.innerHTML = '';
                pesos.forEach(item => {
                    let f = item.Fecha ? new Date(item.Fecha).toLocaleDateString([], {day: '2-digit', month: '2-digit'}) : "--/--";
                    lista.innerHTML += `<li class="historial-item"><div><strong>${item.Ejercicio}</strong> <span class="fecha-tag">(${f})</span></div><span class="peso-tag">${item.Peso} Kg</span></li>`;
                });
            } catch (err) { console.error(err); }
        }

        document.getElementById('formFicha').addEventListener('submit', async (e) => {
            e.preventDefault();
            const peso = document.getElementById('fichaPeso').value;
            const altura = document.getElementById('fichaAltura').value;
            const sexo = document.getElementById('fichaSexo').value;
            const lesiones = document.getElementById('fichaLesiones').value;
            const actividadExtra = document.getElementById('fichaActividadExtra').value;
            const res = await fetch(`/api/socios/ficha/${socioId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ peso, altura, sexo, lesiones, actividadExtra })
            });
            if(res.ok) { alert('¡Ficha actualizada!'); window.location.reload(); }
        });

        document.getElementById('formPesos').addEventListener('submit', async (e) => {
            e.preventDefault();
            const ejercicio = document.getElementById('ejercicio').value;
            const peso = document.getElementById('peso').value;
            const res = await fetch('/api/socios/pesos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ socioId, ejercicio, peso })
            });
            if(res.ok) { document.getElementById('peso').value = ''; cargarDatosPerfil(); }
        });

        function cerrarSesion() { localStorage.clear(); window.location.href = 'login.html'; }
        document.addEventListener('DOMContentLoaded', () => cargarDatosPerfil());
    </script>
</body>
</html>
